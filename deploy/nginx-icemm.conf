# /etc/nginx/sites-available/icemm
# Reemplazar 187.127.29.98 por la IP real (o un server_name si tenés dominio).

server {
  listen 80;
  server_name 187.127.29.98;

  # Frontend estático (Vite build)
  root /var/www/icemm/frontend/dist;
  index index.html;

  # Cache agresivo en assets con hash en nombre
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy hacia el backend Express
  location /api/ {
    proxy_pass http://127.0.0.1:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Excel grandes
    client_max_body_size 50M;
    proxy_read_timeout 60s;
  }

  # Health check expuesto sin /api/
  location = /health {
    proxy_pass http://127.0.0.1:3001/health;
  }

  # Hardening básico
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
